<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" rx="190" fill="#F8C100"/>

  <!-- ===== customs officer ===== -->
  <g fill="#141414">
    <!-- peaked cap crown -->
    <path d="M300 304 Q300 250 380 250 Q460 250 460 304 L460 312 L300 312 Z"/>
    <!-- cap visor -->
    <path d="M284 316 Q380 302 476 316 L468 340 Q380 328 292 336 Z"/>
    <!-- head -->
    <circle cx="380" cy="392" r="66"/>
    <!-- shoulders / bust -->
    <path d="M268 582 Q268 466 380 466 Q492 466 492 582 Z"/>
  </g>

  <!-- sash (Sam Browne belt) -->
  <line x1="462" y1="486" x2="312" y2="576" stroke="#F8C100" stroke-width="26" stroke-linecap="round"/>

  <!-- inspection desk / counter -->
  <g fill="#141414">
    <rect x="232" y="582" width="372" height="92" rx="12"/>
    <!-- open suitcase on the desk -->
    <rect x="262" y="548" width="150" height="40" rx="8"/>
  </g>

  <!-- ===== up arrow (proceed) ===== -->
  <path fill="#141414" d="M760 352 L848 470 L800 470 L800 672 L720 672 L720 470 L672 470 Z"/>
</svg>
